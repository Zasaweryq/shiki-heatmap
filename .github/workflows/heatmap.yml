name: Build Shiki Heatmap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # каждый день в 03:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate heatmap
        env:
          SHIKI_USER_ID: ${{ secrets.SHIKI_USER_ID }}
          DAYS: "365"
        run: |
          python generate_heatmap.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/heatmap.svg
          git commit -m "Update heatmap" || exit 0
          git push
